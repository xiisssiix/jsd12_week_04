<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporting Economic Mobility</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="bg-white w-full max-w-2xl border-4 border-blue-600 overflow-hidden shadow-2xl">
        
        <div class="p-8 pt-10">
            <h1 class="text-5xl font-extrabold text-slate-900 leading-tight mb-4">
                Supporting economic mobility
            </h1>
            <p class="text-sm font-bold text-slate-800 max-w-md leading-relaxed">
                Everyone should have access to a good job and income that can help them 
                and their families have a better life.
            </p>
        </div>

        <div class="w-full h-96 overflow-hidden">
            <img 
                src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" 
                alt="Business woman smiling" 
                class="w-full h-full object-cover object-top"
            >
        </div>

    </div>

</body>
</html>
